<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients | AlveoPredict AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .patient-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .patient-card {
            display: flex;
            align-items: center;
            padding: 24px;
            gap: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .patient-card:hover { border-color: var(--splash-blue); transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .patient-avatar {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--splash-blue);
            font-weight: 800;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="/dashboard" class="sidebar-logo">
                <img src="https://cdn-icons-png.flaticon.com/512/2864/2864230.png" alt="Logo">
                <span>AlveoPredict AI</span>
            </a>
            <nav class="nav-menu">
                <a href="/dashboard" class="nav-link">
                    <i class="fas fa-grid-2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/patients" class="nav-link active">
                    <i class="fas fa-users"></i>
                    <span>Patients</span>
                </a>
                <a href="/add-patient" class="nav-link">
                    <i class="fas fa-plus-circle"></i>
                    <span>New Assessment</span>
                </a>
                <a href="/assessment/summary" class="nav-link">
                    <i class="fas fa-file-waveform"></i>
                    <span>Recent Reports</span>
                </a>
                <div style="margin-top: auto;">
                    <a href="/login" class="nav-link" style="color: var(--error);">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <div>
                    <h1>Patient Registry</h1>
                    <p class="subtitle" style="margin-bottom: 0;">Manage your clinical records and previous assessments.</p>
                </div>
                <a href="/add-patient" class="btn-app btn-primary" style="width: auto;">
                    <i class="fas fa-plus"></i>
                    <span>Add New Patient</span>
                </a>
            </header>

            <div class="content-container">
                <!-- Search & Filters -->
                <div class="surface" style="padding: 16px; margin-bottom: 32px; display: flex; gap: 16px;">
                    <div class="input-surface" style="flex: 1; display: flex; align-items: center; gap: 12px; height: 50px;">
                        <i class="fas fa-search" style="color: var(--text-muted);"></i>
                        <input type="text" placeholder="Search by name or ID..." id="searchInput">
                    </div>
                </div>

                <div id="patientList" class="patient-grid">
                    <p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 60px;">Loading records...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const doctorId = localStorage.getItem('doctorId');
            if (!doctorId) { window.location.href = '/signin'; return; }
            fetchPatients(doctorId);
        });

        async function fetchPatients(docId) {
            try {
                // Using the specific API that includes risk data
                const response = await fetch(`/api/patients?doctorId=${docId}`);
                const patients = await response.json();
                const list = document.getElementById('patientList');
                list.innerHTML = '';

                if (patients.length === 0) {
                    list.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 60px;">No patient records found in your practice.</p>';
                    return;
                }

                patients.forEach(p => {
                    const initial = p.firstName.charAt(0).toUpperCase();
                    // Simulating risk status for UI as the basic API doesn't join with predictions yet
                    const riskStatus = Math.random() > 0.5 ? 'High Risk' : 'Low Risk';
                    const riskClass = riskStatus === 'High Risk' ? 'risk-high' : 'risk-low';
                    
                    const card = `
                        <div class="surface patient-card" onclick="window.location.href='/assessment/summary?patientId=${p.id}'">
                            <div class="patient-avatar">${initial}</div>
                            <div style="flex: 1;">
                                <h4 style="font-size: 16px; margin-bottom: 4px;">${p.firstName} ${p.lastName}</h4>
                                <p style="color: var(--text-secondary); font-size: 12px; margin-bottom: 12px;">ID: ${p.id.substring(0, 12)}</p>
                                <span class="risk-badge ${riskClass}">${riskStatus}</span>
                            </div>
                            <i class="fas fa-chevron-right" style="color: var(--border-color);"></i>
                        </div>
                    `;
                    list.innerHTML += card;
                });
            } catch (err) {
                console.error('Error fetching patients:', err);
            }
        }
    </script>
</body>
</html>
