<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodontal Status | AlveoPredict AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="/dashboard" class="sidebar-logo">
                <img src="https://cdn-icons-png.flaticon.com/512/2864/2864230.png" alt="Logo">
                <span>AlveoPredict AI</span>
            </a>
            <nav class="nav-menu">
                <a href="/dashboard" class="nav-link">
                    <i class="fas fa-grid-2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/patients" class="nav-link">
                    <i class="fas fa-users"></i>
                    <span>Patients</span>
                </a>
                <a href="/add-patient" class="nav-link active">
                    <i class="fas fa-plus-circle"></i>
                    <span>New Assessment</span>
                </a>
                <a href="/assessment/summary" class="nav-link">
                    <i class="fas fa-file-waveform"></i>
                    <span>Recent Reports</span>
                </a>
                <div style="margin-top: auto;">
                    <a href="/login" class="nav-link" style="color: var(--error);">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="margin-bottom: 40px; display: flex; align-items: center; gap: 20px;">
                <a href="/assessment/features" class="btn-app btn-outline" style="width: auto; padding: 10px 15px;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h1>Periodontal Status</h1>
                    <p class="subtitle" style="margin-bottom: 0;">Clinical dental metrics and periodontal health indicators.</p>
                </div>
            </header>

            <div class="content-container" style="max-width: 900px;">
                <form id="periodontalForm" class="surface">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Probing Depth (mm)</label>
                            <div class="input-surface">
                                <input type="number" step="0.1" id="probingDepth" placeholder="e.g. 3.5" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Clinical Attachment Loss (mm)</label>
                            <div class="input-surface">
                                <input type="number" step="0.1" id="cal" placeholder="e.g. 2.0" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Bleeding on Probing (%)</label>
                            <div class="input-surface">
                                <input type="number" id="bop" placeholder="e.g. 15" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Plaque Index (%)</label>
                            <div class="input-surface">
                                <input type="number" id="plaqueIndex" placeholder="e.g. 20" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Gingival Recession (mm)</label>
                            <div class="input-surface">
                                <input type="number" step="0.1" id="recession" placeholder="e.g. 1.0" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Mobility (Miller Class)</label>
                            <div class="input-surface">
                                <select id="mobility" required>
                                    <option value="0">Class 0 (Normal)</option>
                                    <option value="1">Class I</option>
                                    <option value="2">Class II</option>
                                    <option value="3">Class III</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Furcation Involvement</label>
                            <div class="input-surface">
                                <select id="furcation" required>
                                    <option value="None">None</option>
                                    <option value="Class I">Class I</option>
                                    <option value="Class II">Class II</option>
                                    <option value="Class III">Class III</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Tooth Loss (Excl. 3rd molars)</label>
                            <div class="input-surface">
                                <input type="number" id="toothLoss" placeholder="e.g. 2" required>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 40px; display: flex; gap: 16px;">
                        <button type="button" class="btn-app btn-outline" style="flex: 1;" onclick="history.back()">Back</button>
                        <button type="submit" class="btn-app btn-primary" style="flex: 2;">
                            <i class="fas fa-save"></i>
                            <span>Save & Return to Framework</span>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const existing = JSON.parse(localStorage.getItem('periodontalData') || '{}');
            if (existing.probingDepth) document.getElementById('probingDepth').value = existing.probingDepth;
            if (existing.cal) document.getElementById('cal').value = existing.cal;
            if (existing.bop) document.getElementById('bop').value = existing.bop;
            if (existing.plaqueIndex) document.getElementById('plaqueIndex').value = existing.plaqueIndex;
            if (existing.recession) document.getElementById('recession').value = existing.recession;
            if (existing.mobility) document.getElementById('mobility').value = existing.mobility;
            if (existing.furcation) document.getElementById('furcation').value = existing.furcation;
            if (existing.toothLoss) document.getElementById('toothLoss').value = existing.toothLoss;
        });

        document.getElementById('periodontalForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const data = {
                probingDepth: document.getElementById('probingDepth').value,
                cal: document.getElementById('cal').value,
                bop: document.getElementById('bop').value,
                plaqueIndex: document.getElementById('plaqueIndex').value,
                recession: document.getElementById('recession').value,
                mobility: document.getElementById('mobility').value,
                furcation: document.getElementById('furcation').value,
                toothLoss: document.getElementById('toothLoss').value
            };

            localStorage.setItem('periodontalData', JSON.stringify(data));
            localStorage.setItem('periodontalDone', 'true');
            window.location.href = '/assessment/features';
        });
    </script>
</body>
</html>
