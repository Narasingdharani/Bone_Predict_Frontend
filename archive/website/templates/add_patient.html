<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient | AlveoPredict AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="/dashboard" class="sidebar-logo">
                <img src="https://cdn-icons-png.flaticon.com/512/2864/2864230.png" alt="Logo">
                <span>AlveoPredict AI</span>
            </a>
            <nav class="nav-menu">
                <a href="/dashboard" class="nav-link">
                    <i class="fas fa-grid-2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/patients" class="nav-link">
                    <i class="fas fa-users"></i>
                    <span>Patients</span>
                </a>
                <a href="/add-patient" class="nav-link active">
                    <i class="fas fa-plus-circle"></i>
                    <span>New Assessment</span>
                </a>
                <a href="/assessment/summary" class="nav-link">
                    <i class="fas fa-file-waveform"></i>
                    <span>Recent Reports</span>
                </a>
                <div style="margin-top: auto;">
                    <a href="/login" class="nav-link" style="color: var(--error);">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="margin-bottom: 40px; display: flex; align-items: center; gap: 20px;">
                <a href="/patients" class="btn-app btn-outline" style="width: auto; padding: 10px 15px;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h1>Register New Patient</h1>
                    <p class="subtitle" style="margin-bottom: 0;">Enter demographic details to begin the Alveolar Ridge Resorption assessment.</p>
                </div>
            </header>

            <div class="content-container" style="max-width: 900px;">
                <div class="surface" style="margin-bottom: 32px; border-left: 6px solid var(--splash-blue);">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <p style="font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 800; letter-spacing: 1px;">Session Identifier</p>
                            <h2 style="color: var(--splash-blue); font-size: 28px; margin-top: 4px;" id="generatedId">Generating...</h2>
                        </div>
                        <i class="fas fa-fingerprint" style="font-size: 40px; color: var(--accent-light);"></i>
                    </div>
                </div>

                <form id="addPatientForm" class="surface">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>First Name</label>
                            <div class="input-surface">
                                <input type="text" id="firstName" placeholder="Jane" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <div class="input-surface">
                                <input type="text" id="lastName" placeholder="Doe" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Date of Birth</label>
                            <div class="input-surface">
                                <input type="date" id="dob" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <div class="input-surface">
                                <select id="gender" required>
                                    <option value="" disabled selected>Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Contact Number</label>
                            <div class="input-surface">
                                <input type="tel" id="contact" placeholder="+1 (555) 000-0000" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Clinical Status</label>
                            <div class="input-surface">
                                <select id="status">
                                    <option value="In-Patient">In-Patient</option>
                                    <option value="Out-Patient">Out-Patient</option>
                                    <option value="Emergency">Emergency</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 40px; display: flex; gap: 16px;">
                        <button type="button" class="btn-app btn-outline" style="flex: 1;" onclick="history.back()">Discard</button>
                        <button type="submit" id="submitBtn" class="btn-app btn-primary" style="flex: 2;">
                            <i class="fas fa-check-circle"></i>
                            <span>Register & Continue to Assessment</span>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        const p_id = 'P-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        document.getElementById('generatedId').textContent = p_id;

        document.getElementById('addPatientForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const doctorId = localStorage.getItem('doctorId') || 'DOC-DEFAULT';
            const submitBtn = document.getElementById('submitBtn');

            const patientData = {
                id: p_id,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                contactNumber: document.getElementById('contact').value,
                doctorId: doctorId,
                createdAt: Date.now()
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Registering...</span>';

            try {
                const response = await fetch('/api/patients', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patientData)
                });

                if (response.ok) {
                    localStorage.setItem('lastPatientId', p_id);
                    localStorage.setItem('lastPatientName', `${patientData.firstName} ${patientData.lastName}`);
                    window.location.href = '/assessment/features';
                } else {
                    alert('Failed to register patient. Please check your connection.');
                }
            } catch (err) {
                console.error('Error adding patient:', err);
                alert('An error occurred. Patient data saved locally for retry.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check-circle"></i><span>Register & Continue to Assessment</span>';
            }
        });
    </script>
</body>
</html>
