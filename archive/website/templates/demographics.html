<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demographics | AlveoPredict AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="/dashboard" class="sidebar-logo">
                <img src="https://cdn-icons-png.flaticon.com/512/2864/2864230.png" alt="Logo">
                <span>AlveoPredict AI</span>
            </a>
            <nav class="nav-menu">
                <a href="/dashboard" class="nav-link">
                    <i class="fas fa-grid-2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/patients" class="nav-link">
                    <i class="fas fa-users"></i>
                    <span>Patients</span>
                </a>
                <a href="/add-patient" class="nav-link active">
                    <i class="fas fa-plus-circle"></i>
                    <span>New Assessment</span>
                </a>
                <a href="/assessment/summary" class="nav-link">
                    <i class="fas fa-file-waveform"></i>
                    <span>Recent Reports</span>
                </a>
                <div style="margin-top: auto;">
                    <a href="/login" class="nav-link" style="color: var(--error);">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="margin-bottom: 40px; display: flex; align-items: center; gap: 20px;">
                <a href="/assessment/features" class="btn-app btn-outline" style="width: auto; padding: 10px 15px;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h1>Patient Demographics</h1>
                    <p class="subtitle" style="margin-bottom: 0;">Systemic health and lifestyle indicators for <span id="currentPatientName" style="color: var(--splash-blue); font-weight: 700;">Patient</span>.</p>
                </div>
            </header>

            <div class="content-container" style="max-width: 900px;">
                <form id="demographicsForm" class="surface">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Patient Age (Years)</label>
                            <div class="input-surface">
                                <input type="number" id="age" placeholder="e.g. 45" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <div class="input-surface">
                                <select id="gender" required>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Systemic Disease Indicators</label>
                            <div class="input-surface">
                                <select id="disease" required>
                                    <option value="None">None</option>
                                    <option value="Diabetes">Diabetes Mellitus</option>
                                    <option value="Hypertension">Hypertension</option>
                                    <option value="Osteoporosis">Osteoporosis</option>
                                    <option value="Multiple">Multiple Conditions</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Smoking Status</label>
                            <div class="input-surface">
                                <select id="smoking" required>
                                    <option value="Non-smoker">Never Smoked</option>
                                    <option value="Former smoker">Former Smoker</option>
                                    <option value="Current smoker (Light)">Light Smoker (1-5/day)</option>
                                    <option value="Current smoker (Heavy)">Heavy Smoker (10+/day)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Oral Hygiene Compliance</label>
                            <div class="input-surface">
                                <select id="hygiene" required>
                                    <option value="Good">Good (Daily flossing)</option>
                                    <option value="Fair">Fair (Irregular maintenance)</option>
                                    <option value="Poor">Poor (Visible plaque/calculus)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Frequency of Dental Visits</label>
                            <div class="input-surface">
                                <select id="visits" required>
                                    <option value="1">Once per year</option>
                                    <option value="2">Twice per year</option>
                                    <option value="3">Quarterly (3-4 times)</option>
                                    <option value="0">Irregular/Symptomatic only</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 40px; display: flex; gap: 16px;">
                        <button type="button" class="btn-app btn-outline" style="flex: 1;" onclick="history.back()">Back</button>
                        <button type="submit" class="btn-app btn-primary" style="flex: 2;">
                            <i class="fas fa-save"></i>
                            <span>Save & Return to Framework</span>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const name = localStorage.getItem('lastPatientName');
            if (name) document.getElementById('currentPatientName').textContent = name;
            
            // Pre-fill if exists
            const existing = JSON.parse(localStorage.getItem('demographicsData') || '{}');
            if (existing.age) document.getElementById('age').value = existing.age;
            if (existing.gender) document.getElementById('gender').value = existing.gender;
            if (existing.disease) document.getElementById('disease').value = existing.disease;
            if (existing.smoking) document.getElementById('smoking').value = existing.smoking;
            if (existing.hygiene) document.getElementById('hygiene').value = existing.hygiene;
            if (existing.visits) document.getElementById('visits').value = existing.visits;
        });

        document.getElementById('demographicsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const data = {
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                disease: document.getElementById('disease').value,
                smoking: document.getElementById('smoking').value,
                hygiene: document.getElementById('hygiene').value,
                visits: document.getElementById('visits').value
            };

            localStorage.setItem('demographicsData', JSON.stringify(data));
            localStorage.setItem('demographicsDone', 'true');
            window.location.href = '/assessment/features';
        });
    </script>
</body>
</html>
