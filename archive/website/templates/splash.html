<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlveoPredict AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="splash-bg">
    <div class="container splash-bg" style="text-align: center;">
        <!-- Logo Container -->
        <div style="width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);">
            <i class="fas fa-microscope" style="font-size: 60px; color: white;"></i>
        </div>

        <!-- App Name -->
        <h1 style="color: white; font-size: 32px; margin-bottom: 16px;">AlveoPredict AI</h1>

        <!-- Subtitle -->
        <p style="color: rgba(255,255,255,0.8); font-size: 16px; max-width: 300px;">
            Predictive Modeling of Alveolar Ridge Resorption
        </p>

        <!-- Progress Indicators (Dots) -->
        <div style="display: flex; gap: 8px; margin-top: 100px;">
            <div style="width: 10px; height: 10px; border-radius: 50%; background: white;"></div>
            <div style="width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.5);"></div>
            <div style="width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.5);"></div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = "/welcome";
        }, 3000); // 3 seconds splash as per app
    </script>
</body>
</html>
