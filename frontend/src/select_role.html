<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role | AlveoPredict</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div style="background: white; padding: 12px 0; display: flex; align-items: center; position: sticky; top: 0; z-index: 100;">
            <a href="/signin" style="color: var(--text-primary); font-size: 20px; text-decoration: none; margin-right: 16px;">
                <i class="fas fa-chevron-left"></i>
            </a>
            <h2 style="font-size: 18px; margin: 0 auto; margin-right: 36px;">Choose Role</h2>
        </div>

        <div style="margin-top: 40px; text-align: center;">
            <p class="subtitle" style="padding: 0 24px; color: #64748B; line-height: 24px;">Select your professional role to personalize your experience.</p>
        </div>

        <div style="margin-top: 48px;">
            <!-- Role Card: Doctor -->
            <div class="surface role-card" onclick="selectRole('Doctor')" id="cardDoctorRole" style="margin-bottom: 20px; cursor: pointer;">
                <div class="role-icon">
                    <i class="fas fa-hospital"></i>
                </div>
                <div style="flex: 1; text-align: left; margin-left: 16px;">
                    <h3 style="font-size: 16px; margin-bottom: 4px; color: #1E293B;">Doctor / Specialist</h3>
                    <p style="color: #64748B; font-size: 12px;">Access clinical tools and patient records</p>
                </div>
                <div class="radio-circle active" id="doctorRadio"></div>
            </div>

            <!-- Role Card: Researcher -->
            <div class="surface role-card" onclick="selectRole('Researcher')" id="cardResearcherRole" style="cursor: pointer;">
                <div class="role-icon" style="background: #F1F5F9; color: #94A3B8;" id="researcherIconBg">
                    <i class="fas fa-briefcase" id="researcherIcon"></i>
                </div>
                <div style="flex: 1; text-align: left; margin-left: 16px;">
                    <h3 style="font-size: 16px; margin-bottom: 4px; color: #1E293B;">Research / Lab</h3>
                    <p style="color: #64748B; font-size: 12px;">View analytics and aggregate data</p>
                </div>
                <div class="radio-circle" id="researcherRadio"></div>
            </div>
        </div>

        <div style="flex: 1;"></div> <!-- Spacer -->

        <div style="margin-bottom: 32px; margin-top: 40px;">
            <a href="/register" class="btn-app btn-primary" style="background: #4A90E2; font-weight: 700; color: white;">
                Continue
            </a>
        </div>
    </div>

    <script>
        let selectedRole = 'Doctor';

        function selectRole(role) {
            selectedRole = role;
            const doctorRadio = document.getElementById('doctorRadio');
            const researcherRadio = document.getElementById('researcherRadio');
            const doctorCard = document.getElementById('cardDoctorRole');
            const researcherCard = document.getElementById('cardResearcherRole');
            const doctorIcon = document.querySelector('#cardDoctorRole .role-icon');
            const researcherIconBg = document.getElementById('researcherIconBg');
            const researcherIcon = document.getElementById('researcherIcon');

            if (role === 'Doctor') {
                doctorRadio.classList.add('active');
                researcherRadio.classList.remove('active');
                doctorCard.style.border = '2px solid #4A90E2';
                researcherCard.style.border = 'none';
                doctorCard.style.boxShadow = '0 8px 16px rgba(0,0,0,0.05)';
                researcherCard.style.boxShadow = '0 1px 3px rgba(0,0,0,0.05)';
                
                doctorIcon.style.background = '#E8F1FF';
                doctorIcon.style.color = '#4A90E2';
                researcherIconBg.style.background = '#F1F5F9';
                researcherIconBg.style.color = '#94A3B8';
            } else {
                researcherRadio.classList.add('active');
                doctorRadio.classList.remove('active');
                researcherCard.style.border = '2px solid #4A90E2';
                doctorCard.style.border = 'none';
                researcherCard.style.boxShadow = '0 8px 16px rgba(0,0,0,0.05)';
                doctorCard.style.boxShadow = '0 1px 3px rgba(0,0,0,0.05)';
                
                researcherIconBg.style.background = '#E8F1FF';
                researcherIconBg.style.color = '#4A90E2';
                doctorIcon.style.background = '#F1F5F9';
                doctorIcon.style.color = '#94A3B8';
            }
        }
        
        // Initialize default selection styling
        selectRole('Doctor');
    </script>
</body>
</html>
