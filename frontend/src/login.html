<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | AlveoPredict AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 480px;
            padding: 60px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            background: white;
            text-align: center;
        }
        .auth-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 32px;
            background: var(--accent-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--splash-blue);
            font-size: 32px;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-microscope"></i>
        </div>
        
        <h1 style="font-size: 32px; margin-bottom: 12px; font-weight: 800;">Welcome Back</h1>
        <p style="color: var(--text-secondary); margin-bottom: 48px; font-size: 15px;">Sign in to continue your clinical analysis</p>

        <div id="errorMsg" style="color: #DC2626; background: #FEF2F2; padding: 12px; border-radius: 12px; margin-bottom: 24px; display: none; font-size: 13px; font-weight: 600;"></div>

        <form id="loginForm" style="text-align: left;">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-surface">
                    <i class="fas fa-envelope" style="color: var(--text-muted); margin-right: 12px;"></i>
                    <input type="email" id="email" placeholder="doctor@hospital.com" autocomplete="off" required style="flex: 1; border: none; outline: none; background: transparent;">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-surface">
                    <i class="fas fa-lock" style="color: var(--text-muted); margin-right: 12px;"></i>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="new-password" required style="flex: 1; border: none; outline: none; background: transparent;">
                    <i class="fas fa-eye" id="togglePassword" style="cursor: pointer; color: var(--text-muted); margin-left: 12px; width: 20px; text-align: center;"></i>
                </div>
            </div>

            <div style="text-align: right; margin-bottom: 40px;">
                <a href="#" style="color: var(--splash-blue); text-decoration: none; font-weight: 700; font-size: 13px;">Forgot Password?</a>
            </div>

            <button type="submit" id="submitBtn" class="btn-app btn-primary" style="height: 60px; font-size: 16px;">
                <span>Sign In</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 40px;">
            <p style="color: var(--text-secondary); font-size: 14px;">
                Don't have an account? 
                <a href="/register" style="color: var(--splash-blue); text-decoration: none; font-weight: 800; border-bottom: 2px solid var(--accent-light);">Sign Up</a>
            </p>
        </div>
    </div>

    <script>
        // Password Toggle Logic
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');

            const emailValue = email.trim();
            const emailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
            
            if (!emailRegex.test(emailValue)) {
                errorMsg.textContent = 'Only @gmail.com email addresses are acceptable.';
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorMsg.textContent = 'Password must be at least 8 characters long.';
                errorMsg.style.display = 'block';
                return;
            }

            if (password[0] !== password[0].toUpperCase()) {
                errorMsg.textContent = 'First letter of password must be capital.';
                errorMsg.style.display = 'block';
                return;
            }

            const specialCharPattern = /[!@#$%^&*(),.?":{}|<>]/;
            if (!specialCharPattern.test(password)) {
                errorMsg.textContent = 'Password must contain at least one special character.';
                errorMsg.style.display = 'block';
                return;
            }

            const numberPattern = /[0-9]/;
            if (!numberPattern.test(password)) {
                errorMsg.textContent = 'Password must contain at least one number.';
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Verifying...</span>';

            try {
                const response = await fetch('http://180.235.121.245:8030/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('doctorId', data.doctorId);
                    localStorage.setItem('doctorName', data.name);
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.textContent = data.error || 'Authentication failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Clinical server unreachable. Check connection.';
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Sign In</span><i class="fas fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
