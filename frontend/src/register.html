<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | AlveoPredict AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 520px;
            padding: 60px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            background: white;
            text-align: center;
        }
        .auth-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 32px;
            background: var(--accent-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--splash-blue);
            font-size: 32px;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-microscope"></i>
        </div>
        
        <h1 style="font-size: 32px; margin-bottom: 12px; font-weight: 800;">Create Account</h1>
        <p style="color: var(--text-secondary); margin-bottom: 48px; font-size: 15px;">Sign up to join our clinical analysis network.</p>

        <div id="errorMsg" style="color: #DC2626; background: #FEF2F2; padding: 12px; border-radius: 12px; margin-bottom: 24px; display: none; font-size: 13px; font-weight: 600;"></div>

        <form id="registerForm" style="text-align: left;">
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label>Full Name</label>
                    <span id="nameInvalid" style="color: #DC2626; font-size: 12px; font-weight: 700; display: none;">Name Invalid</span>
                </div>
                <div class="input-surface">
                    <i class="fas fa-user-md" style="color: var(--text-muted); margin-right: 12px;"></i>
                    <input type="text" id="name" placeholder="Dr. John Doe" autocomplete="off" required style="flex: 1; border: none; outline: none; background: transparent;">
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-surface">
                    <i class="fas fa-envelope" style="color: var(--text-muted); margin-right: 12px;"></i>
                    <input type="email" id="email" placeholder="doctor@hospital.com" autocomplete="off" required style="flex: 1; border: none; outline: none; background: transparent;">
                </div>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <div class="input-surface">
                    <i class="fas fa-phone" style="color: var(--text-muted); margin-right: 12px;"></i>
                    <input type="tel" id="phone" placeholder="+1 234 567 890" autocomplete="off" style="flex: 1; border: none; outline: none; background: transparent;">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-surface">
                    <i class="fas fa-lock" style="color: var(--text-muted); margin-right: 12px;"></i>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="new-password" required style="flex: 1; border: none; outline: none; background: transparent;">
                    <i class="fas fa-eye" id="togglePassword" style="cursor: pointer; color: var(--text-muted); margin-left: 12px; width: 20px; text-align: center;"></i>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 48px;">
                <label>Confirm Password</label>
                <div class="input-surface">
                    <i class="fas fa-shield-check" style="color: var(--text-muted); margin-right: 12px;"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" autocomplete="new-password" required style="flex: 1; border: none; outline: none; background: transparent;">
                    <i class="fas fa-eye" id="toggleConfirm" style="cursor: pointer; color: var(--text-muted); margin-left: 12px; width: 20px; text-align: center;"></i>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-app btn-primary" style="height: 64px; font-size: 16px;">
                <span>Sign Up</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 40px;">
            <p style="color: var(--text-secondary); font-size: 14px;">
                Already have an account? 
                <a href="/login" style="color: var(--splash-blue); text-decoration: none; font-weight: 800; border-bottom: 2px solid var(--accent-light);">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        // Real-time Name Validation
        const nameInput = document.getElementById('name');
        const nameInvalid = document.getElementById('nameInvalid');
        nameInput.addEventListener('input', (e) => {
            // Physically prevent numbers- remove them as they are typed
            e.target.value = e.target.value.replace(/[^a-zA-Z\s\.]/g, '');
            
            const regex = /^[a-zA-Z\s\.]*$/;
            if (!regex.test(nameInput.value)) {
                nameInvalid.style.display = 'block';
            } else {
                nameInvalid.style.display = 'none';
            }
        });

        // Password Toggle Logic
        function setupToggle(inputId, toggleId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(toggleId);
            toggle.addEventListener('click', () => {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                toggle.classList.toggle('fa-eye');
                toggle.classList.toggle('fa-eye-slash');
            });
        }
        setupToggle('password', 'togglePassword');
        setupToggle('confirmPassword', 'toggleConfirm');

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');

            const nameValue = name.trim();
            const nameRegex = /^[a-zA-Z\s\.]+$/;
            if (!nameRegex.test(nameValue)) {
                errorMsg.textContent = 'Name must contain only alphabets and Title (e.g., Dr.).';
                errorMsg.style.display = 'block';
                return;
            }

            const emailValue = email.trim();
            const emailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
            
            if (!emailRegex.test(emailValue)) {
                errorMsg.textContent = 'Only @gmail.com email addresses are acceptable.';
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorMsg.textContent = 'Password must be at least 8 characters long.';
                errorMsg.style.display = 'block';
                return;
            }

            if (password[0] !== password[0].toUpperCase()) {
                errorMsg.textContent = 'First letter of password must be capital.';
                errorMsg.style.display = 'block';
                return;
            }

            const specialCharPattern = /[!@#$%^&*(),.?":{}|<>]/;
            if (!specialCharPattern.test(password)) {
                errorMsg.textContent = 'Password must contain at least one special character.';
                errorMsg.style.display = 'block';
                return;
            }

            const numberPattern = /[0-9]/;
            if (!numberPattern.test(password)) {
                errorMsg.textContent = 'Password must contain at least one number.';
                errorMsg.style.display = 'block';
                return;
            }

            if (password !== confirm) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Registering...</span>';

            try {
                const response = await fetch('http://180.235.121.245:8030/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Registration successful! Redirecting to login.');
                    window.location.href = '/login';
                } else {
                    errorMsg.textContent = data.error || 'Registration failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Could not reach server. Check connection.';
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Sign Up</span><i class="fas fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
